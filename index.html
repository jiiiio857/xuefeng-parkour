<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>雪峰跑酷</title>
    <style>
        /* ============================================================
           雪峰跑酷 — 像素风 UI 样式
           ============================================================ */
        :root {
            --dpad-size: 124px;
            --btn-size: 38px;
            --center-size: 30px;
            --jump-size: 58px;
            --ui-shadow: 0 2px 0 rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Courier New', 'Source Code Pro', 'Consolas', monospace;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            top: 0; left: 0;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
        }

        /* ========== 像素风覆盖层 ========== */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: all;
            background: rgba(10, 10, 18, 0.82);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .overlay.hidden { display: none; }

        /* 像素边框卡片 */
        .pixel-card {
            background: #1a1a2e;
            border: 3px solid #4a4a6a;
            box-shadow:
                0 0 0 2px #0a0a12,
                0 0 0 5px #3a3a5a,
                4px 4px 0 #0a0a12,
                inset 0 0 0 1px rgba(255,255,255,0.05);
            padding: 28px 32px;
            text-align: center;
            max-width: 88vw;
        }

        /* ========== 开始界面 ========== */
        #startScreen .game-title {
            font-size: clamp(26px, 6vw, 44px);
            font-weight: bold;
            color: #FFE082;
            letter-spacing: 4px;
            text-shadow:
                3px 3px 0 #1a1a2e,
                4px 4px 0 #FF6D00,
                6px 6px 0 #1a1a2e;
            margin-bottom: 6px;
        }
        #startScreen .game-subtitle {
            font-size: clamp(12px, 2.6vw, 17px);
            color: #B0BEC5;
            letter-spacing: 3px;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 44px;
            font-family: inherit;
            font-size: clamp(15px, 3vw, 22px);
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            cursor: pointer;
            border: 3px solid;
            text-transform: uppercase;
            transition: transform 0.06s;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .btn:active { transform: translateY(2px); }

        .btn-start {
            background: #2E7D32;
            border-color: #66BB6A;
            box-shadow: 0 4px 0 #1B5E20, 0 6px 12px rgba(0,0,0,0.5);
        }
        .btn-start:active { box-shadow: 0 1px 0 #1B5E20, 0 3px 6px rgba(0,0,0,0.5); }

        .btn-retry {
            background: #1565C0;
            border-color: #64B5F6;
            box-shadow: 0 4px 0 #0D47A1, 0 6px 12px rgba(0,0,0,0.5);
        }
        .btn-retry:active { box-shadow: 0 1px 0 #0D47A1, 0 3px 6px rgba(0,0,0,0.5); }

        /* ========== 结束 & 胜利界面 ========== */
        .end-msg {
            font-size: clamp(22px, 5vw, 36px);
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .end-msg.gameover { color: #EF5350; text-shadow: 2px 2px 0 #1a1a2e, 3px 3px 0 #B71C1C; }
        .end-msg.victory { color: #FFD740; text-shadow: 2px 2px 0 #1a1a2e, 3px 3px 0 #FF6D00; }
        .end-score {
            font-size: clamp(14px, 2.8vw, 19px);
            color: #B0BEC5;
            margin-bottom: 28px;
            letter-spacing: 2px;
        }

        /* ========== HUD — 左上角雪碧计数 ========== */
        #hud {
            position: absolute;
            top: 12px; left: 14px;
            z-index: 5;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(10,10,18,0.55);
            border: 2px solid rgba(255,255,255,0.15);
            padding: 5px 14px 5px 8px;
        }
        #hud .hud-icon {
            width: 22px; height: 26px;
            display: inline-block;
            image-rendering: pixelated;
        }
        #hud .hud-score {
            font-family: 'Courier New', monospace;
            font-size: clamp(15px, 3vw, 22px);
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
            line-height: 1;
        }

        /* ============================================================
           任天堂经典十字方向键 (D-Pad)
           ============================================================ */
        #mobileControls {
            position: absolute;
            /* 按键吸附屏幕底部左右两角，方便单手操作 */
            bottom: 14px;
            left: 0; right: 0;
            z-index: 8;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 12px;
            pointer-events: none;
        }
        /* 宽屏设备（平板/桌面）隐藏虚拟按键，使用键盘操作 */
        @media (min-width: 1024px) and (hover: hover) {
            #mobileControls { display: none; }
        }

        /* ---- 十字键容器 ---- */
        .dpad-wrap {
            pointer-events: all;
            display: flex;
            align-items: flex-end;
        }
        .dpad {
            position: relative;
            width: var(--dpad-size);
            height: var(--dpad-size);
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.5));
        }
        /* 十字底盘 */
        .dpad::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                /* 水平条 */
                linear-gradient(#3a3a4a, #2a2a38) no-repeat center / 100% 42px,
                /* 垂直条 */
                linear-gradient(#3a3a4a, #2a2a38) no-repeat center / 42px 100%,
                /* 四角暗色 */
                radial-gradient(circle at 30% 30%, #222233 35%, transparent 36%),
                radial-gradient(circle at 70% 30%, #222233 35%, transparent 36%),
                radial-gradient(circle at 30% 70%, #222233 35%, transparent 36%),
                radial-gradient(circle at 70% 70%, #222233 35%, transparent 36%);
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.12);
            z-index: 0;
        }
        /* 方向按钮 */
        .dpad-btn {
            position: absolute;
            background: #3d3d50;
            border: 1.5px solid rgba(255,255,255,0.18);
            color: #ccd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            z-index: 1;
            transition: background 0.05s;
        }
        .dpad-btn::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
        }
        .dpad-btn:active, .dpad-btn.pressed {
            background: #5a5a72;
            border-color: rgba(255,255,255,0.4);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
        }

        /* 上 */
        .dpad-up {
            top: 2px; left: 50%;
            transform: translateX(-50%);
            width: 38px; height: 40px;
            border-radius: 7px 7px 2px 2px;
        }
        /* 下 */
        .dpad-down {
            bottom: 2px; left: 50%;
            transform: translateX(-50%);
            width: 38px; height: 40px;
            border-radius: 2px 2px 7px 7px;
        }
        /* 左 */
        .dpad-left {
            left: 2px; top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 38px;
            border-radius: 7px 2px 2px 7px;
        }
        /* 右 */
        .dpad-right {
            right: 2px; top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 38px;
            border-radius: 2px 7px 7px 2px;
        }
        /* 中心圆 */
        .dpad-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: var(--center-size); height: var(--center-size);
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #4a4a5a, #2a2a38);
            border: 1.5px solid rgba(255,255,255,0.12);
            z-index: 2;
            pointer-events: none;
        }

        /* 方向箭头符号 */
        .dpad-arrow {
            font-size: 18px;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* ---- 跳跃按钮 (右下角) ---- */
        .jump-wrap {
            pointer-events: all;
            display: flex;
            align-items: flex-end;
        }
        #btnJump {
            width: var(--jump-size);
            height: var(--jump-size);
            border-radius: 50%;
            border: 2.5px solid rgba(255,200,60,0.5);
            background: radial-gradient(circle at 40% 35%, #FFB74D, #E65100);
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            box-shadow:
                0 5px 0 #BF360C,
                0 7px 14px rgba(0,0,0,0.45);
            transition: transform 0.05s, box-shadow 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btnJump:active, #btnJump.pressed {
            transform: translateY(3px);
            box-shadow:
                0 2px 0 #BF360C,
                0 3px 6px rgba(0,0,0,0.45);
            background: radial-gradient(circle at 40% 35%, #FFCC80, #F4511E);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD — 左上角雪碧计数 -->
        <div id="hud">
            <canvas id="hudIcon" class="hud-icon" width="22" height="26"></canvas>
            <span class="hud-score" id="scoreDisplay">0</span>
        </div>

        <!-- 开始界面 -->
        <div id="startScreen" class="overlay">
            <div class="pixel-card">
                <div class="game-title">❄ 雪峰跑酷</div>
                <div class="game-subtitle">S N O W · P E A K · R U N</div>
                <button class="btn btn-start" id="btnStart">▶ 开始游戏</button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="overlay hidden">
            <div class="pixel-card">
                <div class="end-msg gameover">💀 冒险结束</div>
                <div class="end-score">收集雪碧瓶 ×<span id="gameOverScore">0</span></div>
                <button class="btn btn-retry" id="btnRetry">🔄 重新挑战</button>
            </div>
        </div>

        <!-- 胜利界面 -->
        <div id="winScreen" class="overlay hidden">
            <div class="pixel-card">
                <div class="end-msg victory">🏆 雪峰登顶</div>
                <div class="end-score">收集雪碧瓶 ×<span id="winScore">0</span></div>
                <button class="btn btn-retry" id="btnWinRetry">🔄 再来一局</button>
            </div>
        </div>

        <!-- 移动端控制区 -->
        <div id="mobileControls">
            <!-- 左: 十字方向键 -->
            <div class="dpad-wrap">
                <div class="dpad" id="dpad">
                    <button class="dpad-btn dpad-up"    id="dpadUp">    <span class="dpad-arrow">▲</span></button>
                    <button class="dpad-btn dpad-down"  id="dpadDown">  <span class="dpad-arrow">▼</span></button>
                    <button class="dpad-btn dpad-left"  id="dpadLeft">  <span class="dpad-arrow">◀</span></button>
                    <button class="dpad-btn dpad-right" id="dpadRight"> <span class="dpad-arrow">▶</span></button>
                    <div class="dpad-center"></div>
                </div>
            </div>
            <!-- 右: 跳跃按钮 -->
            <div class="jump-wrap">
                <button id="btnJump">JUMP</button>
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    //  ❄ 雪峰跑酷 — 纯 Canvas + 原生 JS 横版跳跃游戏
    // ============================================================

    // ==================== 🖼️ 资源路径（在这里替换你的链接！） ====================
    const ASSET_PATHS = {
        player:   './assets/player.png',        // ★ 主角贴图 — 替换为你的角色图片
        bottle:   './assets/sprite-bottle.png', // ★ 雪碧瓶贴图 — 替换为你的收集物图片
        enemy:    './assets/chocliz.png',       // ★ 巧乐兹贴图 — 替换为你的怪物图片
        bgm:      './assets/bgm.mp3',           // ★ 背景音乐 — 替换为你的 BGM
        gameover: './assets/gameover.mp3',      // ★ 失败音效 — 替换为你的 Game Over 音频
        victory:  './assets/victory.mp3',       // ★ 胜利音效 — 替换为你的通关音频
    };
    // =======================================================================

    // ==================== 游戏常量 ====================
    const GAME_WIDTH   = 800;
    const GAME_HEIGHT  = 450; // 16:9 比例 (800×450)
    const GRAVITY      = 0.55;
    const MAX_FALL     = 12;
    const PLAYER_SPEED = 4.2;
    const JUMP_FORCE   = -10.5;
    const WORLD_W      = 3600;
    const GOAL_X       = 3400;


    // 图片目标高度（宽度根据原图比例自适应，绝不拉伸变形）
    const TARGET_HEIGHTS = { player: 36, bottle: 24, enemy: 30 };

    // 实体尺寸（初始默认值；图片加载后按比例更新）
    let entitySize = {
        player: { w: 28, h: 36 },
        bottle: { w: 20, h: 24 },
        enemy:  { w: 30, h: 30 },
    };

    // ==================== DOM ====================
    const canvas        = document.getElementById('gameCanvas');
    const ctx           = canvas.getContext('2d');
    const container     = document.getElementById('game-container');
    const startScreen   = document.getElementById('startScreen');
    const gameOverScreen= document.getElementById('gameOverScreen');
    const winScreen     = document.getElementById('winScreen');
    const scoreDisplay  = document.getElementById('scoreDisplay');
    const gameOverScore = document.getElementById('gameOverScore');
    const winScore      = document.getElementById('winScore');
    const hudIconCanvas = document.getElementById('hudIcon');
    const hudIconCtx    = hudIconCanvas.getContext('2d');
    const btnStart      = document.getElementById('btnStart');
    const btnRetry      = document.getElementById('btnRetry');
    const btnWinRetry   = document.getElementById('btnWinRetry');
    const btnJump       = document.getElementById('btnJump');

    // ==================== 状态 ====================
    let gameState    = 'menu'; // menu | playing | gameover | win
    let score        = 0;
    let lives        = 3;
    let cameraX      = 0;
    let animFrameId  = null;

    // ==================== 输入 ====================
    const input = {
        left: false, right: false, up: false, down: false,
        jump: false, jumpPressed: false,
    };

    // ==================== 音频 ====================
    let bgmAudio   = null;
    let audioCtx   = null;
    let bgmStarted = false;

    // ==================== 图片 ====================
    const images = { player: null, bottle: null, enemy: null };
    let imagesLoaded = false;

    // ==================== 粒子 ====================
    let particles = [];

    // ==================== 关卡数据 ====================
    const platforms = [
        { x: 0, y: 410, w: WORLD_W, h: 40, isGround: true },
        { x: 280, y: 340, w: 140, h: 14 },
        { x: 520, y: 290, w: 120, h: 14 },
        { x: 750, y: 320, w: 180, h: 14 },
        { x: 1050, y: 250, w: 140, h: 14 },
        { x: 1300, y: 310, w: 160, h: 14 },
        { x: 1600, y: 270, w: 140, h: 14 },
        { x: 1850, y: 330, w: 180, h: 14 },
        { x: 2150, y: 260, w: 150, h: 14 },
        { x: 2450, y: 320, w: 160, h: 14 },
        { x: 2750, y: 280, w: 140, h: 14 },
        { x: 3050, y: 340, w: 160, h: 14 },
    ];

    const bottlesData = [
        { x: 330, y: 265 }, { x: 560, y: 215 }, { x: 810, y: 245 },
        { x: 870, y: 245 }, { x: 1110, y: 175 }, { x: 1360, y: 235 },
        { x: 1650, y: 195 }, { x: 1920, y: 255 }, { x: 2210, y: 185 },
        { x: 2510, y: 245 }, { x: 2810, y: 205 }, { x: 3120, y: 265 },
        { x: 700,  y: 150 }, { x: 2350, y: 130 },
    ];

    const enemiesData = [
        { x: 500,  y: 380, minX: 350,  maxX: 650,  speed: 1.2 },
        { x: 800,  y: 290, minX: 760,  maxX: 900,  speed: 0.9 },
        { x: 1150, y: 380, minX: 1050, maxX: 1250, speed: 1.1 },
        { x: 1400, y: 380, minX: 1300, maxX: 1500, speed: 1.3 },
        { x: 1700, y: 380, minX: 1600, maxX: 1800, speed: 1.0 },
        { x: 1950, y: 300, minX: 1860, maxX: 2000, speed: 0.8 },
        { x: 2250, y: 380, minX: 2150, maxX: 2350, speed: 1.2 },
        { x: 2550, y: 380, minX: 2450, maxX: 2650, speed: 1.0 },
        { x: 2850, y: 380, minX: 2750, maxX: 2950, speed: 1.15 },
    ];

    // ==================== 游戏对象 ====================
    let player, bottles, enemies;

    function createBottle(d) { return { x: d.x, y: d.y, w: entitySize.bottle.w, h: entitySize.bottle.h, collected: false, animT: 0 }; }
    function createEnemy(d)  { return { x: d.x, y: d.y, w: entitySize.enemy.w,  h: entitySize.enemy.h,  vx: d.speed, minX: d.minX, maxX: d.maxX, alive: true, animT: 0 }; }

    function resetGameObjects() {
        player = {
            x: 60, y: 300,
            w: entitySize.player.w, h: entitySize.player.h,
            vx: 0, vy: 0, onGround: false, facingRight: true,
            animFrame: 0, animTimer: 0,
        };
        bottles = bottlesData.map(createBottle);
        enemies  = enemiesData.map(createEnemy);
        particles = [];
        cameraX = 0;
        score   = 0;
        lives   = 3;
        updateHUD();
    }

    // ==================== Canvas 缩放 ====================
    let scaleFactor = 1, offsetX = 0, offsetY = 0;

    function resizeCanvas() {
        const r = container.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width  = r.width * dpr;
        canvas.height = r.height * dpr;
        // 按屏幕宽度缩放，游戏画面垂直居中
        scaleFactor = r.width / GAME_WIDTH;
        offsetX = (r.width  - GAME_WIDTH  * scaleFactor) / 2;
        offsetY = (r.height - GAME_HEIGHT * scaleFactor) / 2;
        // 按键紧贴游戏画面底部：D-Pad 顶部 = 游戏底部 + 12px
        const gameBottom  = offsetY + GAME_HEIGHT * scaleFactor;
        const dpadH       = 124; // D-Pad 容器高度
        const ctrlBottom  = Math.max(r.height - gameBottom - 12 - dpadH, 10);
        document.getElementById('mobileControls').style.bottom = ctrlBottom + 'px';
    }

    // ==================== 按比例缩放尺寸计算 ====================
    function calcScaledSize(img, targetH) {
        if (!img || !img.naturalWidth || !img.naturalHeight) return null;
        const scale = targetH / img.naturalHeight;
        return {
            w: Math.round(img.naturalWidth * scale),
            h: targetH,
        };
    }

    function updateEntitySizes() {
        for (const key of ['player', 'bottle', 'enemy']) {
            const sz = calcScaledSize(images[key], TARGET_HEIGHTS[key]);
            if (sz) entitySize[key] = sz;
        }
        // 重绘 HUD 小图标
        drawHUDIcon();
        console.log('📐 实体尺寸已按原图比例更新:', entitySize);
    }

    // ==================== 音频 ====================
    function initAudio() {
        if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBeep(freq, dur, type='square', vol=0.08) {
        if (!audioCtx) return;
        try {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type;
            o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }

    function sfxCollect()  { playBeep(880,0.08,'square',0.07); setTimeout(()=>playBeep(1320,0.1,'square',0.06),60); }
    function sfxStomp()    { playBeep(150,0.15,'triangle',0.12); }
    function sfxDeath()    { playBeep(400,0.15,'sawtooth',0.08); setTimeout(()=>playBeep(250,0.2,'sawtooth',0.08),120); setTimeout(()=>playBeep(120,0.3,'sawtooth',0.08),260); }
    function sfxWin()      { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playBeep(f,0.15,'square',0.07),i*100)); }

    /** 停止 BGM 并播放一次性音效 */
    function stopBGM() {
        if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; bgmStarted = false; }
    }
    function startBGM() {
        if (bgmStarted) return;
        initAudio();
        try {
            bgmAudio = new Audio(ASSET_PATHS.bgm);
            bgmAudio.loop = true;
            bgmAudio.volume = 0.35;
            bgmAudio.play().then(()=>{ bgmStarted=true; }).catch(()=>{ console.warn('⚠ BGM 播放失败:', ASSET_PATHS.bgm); });
        } catch(e) { console.warn('⚠ BGM 初始化失败:', e.message); }
    }
    function playOnceAudio(path, vol=0.5) {
        try {
            const a = new Audio(path);
            a.volume = vol;
            a.play().catch(()=>{});
        } catch(e) {}
    }

    // ==================== 图片加载 ====================
    function loadImage(src) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload  = () => resolve(img);
            img.onerror = () => { console.warn('⚠ 图片加载失败:', src); resolve(null); };
            img.src = src;
        });
    }

    async function loadAllImages() {
        const [p, b, e] = await Promise.all([
            loadImage(ASSET_PATHS.player),
            loadImage(ASSET_PATHS.bottle),
            loadImage(ASSET_PATHS.enemy),
        ]);
        images.player = p; images.bottle = b; images.enemy = e;
        imagesLoaded = true;
        updateEntitySizes(); // ★ 图片加载后按原始宽高比计算碰撞箱
        console.log('✅ 图片资源加载完成');
    }

    // ==================== 占位绘制 ====================
    function drawPlaceholderPlayer(x, y, w, h, facingRight) {
        ctx.save();
        if (!facingRight) { ctx.translate(x + w/2, 0); ctx.scale(-1,1); x = -w/2; }
        ctx.fillStyle='#E53935'; ctx.fillRect(x+4,y,w-8,10); ctx.fillRect(x+2,y+6,w-4,6);
        ctx.fillStyle='#FFCC80'; ctx.fillRect(x+6,y+12,w-12,10);
        ctx.fillStyle='#000'; ctx.fillRect(x+14,y+14,3,3);
        ctx.fillStyle='#1E88E5'; ctx.fillRect(x+6,y+22,w-12,10);
        ctx.fillStyle='#1565C0'; ctx.fillRect(x+6,y+32,7,4); ctx.fillRect(x+w-13,y+32,7,4);
        ctx.restore();
    }

    function drawPlaceholderBottle(x, y, w, h) {
        ctx.fillStyle='#4CAF50'; ctx.fillRect(x+4,y+4,w-8,h-4);
        ctx.fillStyle='#66BB6A'; ctx.fillRect(x+6,y,w-12,6);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillRect(x+6,y+8,3,h-14);
        ctx.fillStyle='#FFEB3B'; ctx.fillRect(x+5,y+10,w-10,8);
    }

    function drawPlaceholderEnemy(x, y, w, h) {
        ctx.fillStyle='#D4A574'; ctx.fillRect(x+w/2-3,y+h-6,6,8);
        ctx.fillStyle='#9C27B0'; ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w-2,y+h-6); ctx.lineTo(x+2,y+h-6); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#6A1B9A'; ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w-4,y+8); ctx.lineTo(x+4,y+8); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.fillRect(x+8,y+8,6,6); ctx.fillRect(x+w-14,y+8,6,6);
        ctx.fillStyle='#000'; ctx.fillRect(x+10,y+10,3,3); ctx.fillRect(x+w-12,y+10,3,3);
    }

    // ==================== 粒子 ====================
    function spawnParticles(x, y, color, n=10) {
        for (let i=0;i<n;i++) particles.push({ x,y, vx:(Math.random()-0.5)*4, vy:(Math.random()-1)*3-1, life:1, decay:0.02+Math.random()*0.04, color, size:2+Math.random()*3 });
    }
    function updateParticles() {
        for (let i=particles.length-1;i>=0;i--) {
            const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
            if (p.life<=0) particles.splice(i,1);
        }
    }
    function drawParticles() {
        for (const p of particles) { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
        ctx.globalAlpha=1;
    }

    // ==================== HUD ====================
    function drawHUDIcon() {
        const c = hudIconCtx, w = 22, h = 26;
        c.clearRect(0,0,w,h);
        if (images.bottle) {
            c.drawImage(images.bottle, 1, 1, w-2, h-2);
        } else {
            // 像素风小瓶子
            c.fillStyle='#4CAF50'; c.fillRect(5,7,12,16);
            c.fillStyle='#81C784'; c.fillRect(7,2,8,7);
            c.fillStyle='rgba(255,255,255,0.6)'; c.fillRect(7,9,2,10);
            c.fillStyle='#FFEB3B'; c.fillRect(6,12,10,7);
        }
    }

    function updateHUD() {
        scoreDisplay.textContent = score;
    }

    // ==================== 碰撞 ====================
    function rectsOverlap(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

    // ==================== 物理 & 碰撞处理 ====================
    function applyPhysics() {
        // 重力
        player.vy += GRAVITY;
        // 按下 ↓ 快速下落
        if (input.down && !player.onGround) player.vy += 0.45;
        if (player.vy > MAX_FALL) player.vy = MAX_FALL;

        // 水平移动
        if (input.left)  { player.vx = -PLAYER_SPEED; player.facingRight = false; }
        else if (input.right) { player.vx = PLAYER_SPEED; player.facingRight = true; }
        else player.vx = 0;

        // 跳跃 (来自 JUMP 按钮或 D-Pad ↑)
        if (input.jumpPressed && player.onGround) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            input.jumpPressed = false;
        }

        player.x += player.vx;
        player.y += player.vy;

        // 世界边界
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > WORLD_W) player.x = WORLD_W - player.w;

        // 掉落死亡
        if (player.y > GAME_HEIGHT + 50) { killPlayer(); return; }

        // ---- 平台碰撞 ----
        player.onGround = false;
        for (const plat of platforms) {
            if (!rectsOverlap(player, plat)) continue;
            const pb = player.y + player.h;
            const pt = player.y;
            const ppb = pb - player.vy;
            const ppt = pt - player.vy;

            if (player.vy >= 0 && ppb <= plat.y + 4 && pb >= plat.y) {
                player.y = plat.y - player.h;
                player.vy = 0;
                player.onGround = true;
            } else if (player.vy < 0 && ppt >= plat.y + plat.h - 4 && pt <= plat.y + plat.h) {
                player.y = plat.y + plat.h;
                player.vy = 0;
            } else if (!player.onGround) {
                const pr = player.x + player.w, pl = player.x;
                const ppr = pr - player.vx, ppl = pl - player.vx;
                if (ppr <= plat.x && pr > plat.x) { player.x = plat.x - player.w; player.vx = 0; }
                else if (ppl >= plat.x + plat.w && pl < plat.x + plat.w) { player.x = plat.x + plat.w; player.vx = 0; }
            }
        }

        // ---- 收集雪碧瓶 ----
        for (const b of bottles) {
            if (b.collected) continue;
            if (rectsOverlap(player, b)) {
                b.collected = true;
                score += 100;
                updateHUD();
                sfxCollect();
                spawnParticles(b.x+b.w/2, b.y+b.h/2, '#4CAF50', 8);
            }
        }

        // ---- 巧乐兹碰撞：踩头消灭 / 侧面即死 ----
        for (const e of enemies) {
            if (!e.alive) continue;
            if (!rectsOverlap(player, e)) continue;
            const pb = player.y + player.h;
            if (player.vy > 0 && pb - player.vy <= e.y + e.h * 0.4) {
                // 踩头 → 消灭怪物
                e.alive = false;
                player.vy = -6;
                score += 200;
                updateHUD();
                sfxStomp();
                spawnParticles(e.x+e.w/2, e.y+e.h/2, '#9C27B0', 12);
            } else {
                // 侧面碰到 → 直接受伤/死亡
                hurtPlayer();
            }
        }

        // ---- 终点 ----
        if (player.x + player.w > GOAL_X && gameState === 'playing') {
            triggerWin();
        }
    }

    function hurtPlayer() {
        lives--;
        updateHUD();
        sfxDeath();
        if (lives <= 0) {
            triggerGameOver();
        } else {
            player.x = 60; player.y = 300; player.vx = 0; player.vy = -4;
            cameraX = 0;
        }
    }

    function killPlayer() {
        lives--;
        updateHUD();
        sfxDeath();
        if (lives <= 0) {
            triggerGameOver();
        } else {
            player.x = 60; player.y = 300; player.vx = 0; player.vy = -4;
            cameraX = 0;
        }
    }

    function triggerGameOver() {
        gameState = 'gameover';
        stopBGM();
        playOnceAudio(ASSET_PATHS.gameover, 0.5);
        gameOverScore.textContent = score;
        gameOverScreen.classList.remove('hidden');
    }

    function triggerWin() {
        gameState = 'win';
        stopBGM();
        sfxWin();
        playOnceAudio(ASSET_PATHS.victory, 0.5);
        winScore.textContent = score;
        winScreen.classList.remove('hidden');
    }

    // ==================== 敌人 AI ====================
    function updateEnemies() {
        for (const e of enemies) {
            if (!e.alive) continue;
            e.x += e.vx;
            e.animT += 0.05;
            if (e.x <= e.minX || e.x + e.w >= e.maxX) e.vx *= -1;
            if (e.x < e.minX) e.x = e.minX;
            if (e.x + e.w > e.maxX) e.x = e.maxX - e.w;
        }
    }

    // ==================== 更新 ====================
    function update() {
        if (gameState !== 'playing') return;
        applyPhysics();
        updateEnemies();
        updateParticles();
        const tx = player.x - GAME_WIDTH/2 + player.w/2;
        cameraX += (tx - cameraX) * 0.12;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > WORLD_W - GAME_WIDTH) cameraX = WORLD_W - GAME_WIDTH;
        player.animTimer += 0.15;
        player.animFrame = player.onGround ? (Math.abs(player.vx)>0.5 ? Math.floor(player.animTimer)%4 : 0) : 2;
        for (const b of bottles) { if (!b.collected) b.animT += 0.03; }
    }

    // ==================== 渲染 ====================
    /** 绘制全屏背景 — 铺满整个物理屏幕，消除所有黑边 */
    function drawFullscreenBackground() {
        const pw = canvas.width  / scaleFactor;  // 物理像素 → 逻辑像素
        const ph = canvas.height / scaleFactor;
        // 天空渐变填满全屏
        const g = ctx.createLinearGradient(0, 0, 0, ph);
        g.addColorStop(0, '#4FC3F7');
        g.addColorStop(0.55, '#BBDEFB');
        g.addColorStop(1, '#E8F5E9');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, pw, ph);
        // 远山（全屏宽度）
        ctx.fillStyle = '#81C784';
        for (let i = 0; i < Math.ceil(pw / 400) + 1; i++) {
            const sx = i * 400 - (cameraX * 0.15) % 400;
            ctx.beginPath();
            ctx.moveTo(sx - 50, ph);
            ctx.quadraticCurveTo(sx + 100, ph * 0.55, sx + 250, ph);
            ctx.fill();
        }
        // 云朵（全屏分布）
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        const cloudCount = Math.ceil(pw / 180);
        for (let i = 0; i < cloudCount; i++) {
            const cx = i * 190 + 40 - (cameraX * 0.08) % (190 * cloudCount);
            const cy = 30 + (i * 97) % Math.floor(ph * 0.35);
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI * 2);
            ctx.arc(cx + 22, cy - 7, 16, 0, Math.PI * 2);
            ctx.arc(cx + 40, cy, 20, 0, Math.PI * 2);
            ctx.arc(cx + 20, cy + 4, 14, 0, Math.PI * 2);
            ctx.fill();
        }
        // 底部草地延伸
        const groundTop = offsetY / scaleFactor + 410;
        if (groundTop < ph) {
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(0, groundTop + 8, pw, ph - groundTop);
            ctx.fillStyle = '#66BB6A';
            ctx.fillRect(0, groundTop, pw, 8);
        }
    }

    /** 绘制游戏关卡内的背景 */
    function drawBackground() {
        // 天空底色（游戏区域内）
        const g = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        g.addColorStop(0, '#4FC3F7'); g.addColorStop(1, '#BBDEFB');
        ctx.fillStyle = g; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        // 山
        ctx.fillStyle = '#81C784';
        for (let i = 0; i < 8; i++) {
            const sx = i * 400 - (cameraX * 0.2) % 400;
            ctx.beginPath(); ctx.moveTo(sx - 50, GAME_HEIGHT);
            ctx.quadraticCurveTo(sx + 100, 250, sx + 250, GAME_HEIGHT); ctx.fill();
        }
        // 云
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        for (let i = 0; i < 10; i++) {
            const cx = i * 380 + 50 - (cameraX * 0.1) % (380 * 10), cy = 40 + (i * 73) % 120;
            ctx.beginPath();
            ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.arc(cx + 25, cy - 8, 18, 0, Math.PI * 2);
            ctx.arc(cx + 45, cy, 22, 0, Math.PI * 2); ctx.arc(cx + 22, cy + 5, 16, 0, Math.PI * 2); ctx.fill();
        }
    }

    function render() {
        // 第 1 层：全屏背景（无变换，铺满整个物理画布）
        ctx.setTransform(scaleFactor, 0, 0, scaleFactor, 0, 0);
        drawFullscreenBackground();

        // 第 2 层：游戏关卡内容（带偏移，绘制在 16:9 游戏区域内）
        ctx.setTransform(scaleFactor, 0, 0, scaleFactor, offsetX, offsetY);
        drawBackground();
        drawPlatforms();
        drawGoal();
        drawBottles();
        drawEnemies();
        drawPlayer();
        drawParticles();

        ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function drawPlatforms() {
        for (const p of platforms) {
            const sx=p.x-cameraX, sy=p.y;
            if (sx+p.w<-50||sx>GAME_WIDTH+50) continue;
            if (p.isGround) {
                ctx.fillStyle='#8D6E63'; ctx.fillRect(sx,sy,p.w,p.h);
                ctx.fillStyle='#66BB6A'; ctx.fillRect(sx,sy,p.w,8);
                ctx.fillStyle='#4CAF50';
                for (let gx=sx-(sx%20);gx<sx+p.w;gx+=20) ctx.fillRect(gx+4,sy-3,8,6);
            } else {
                ctx.fillStyle='#A1887F'; ctx.fillRect(sx,sy,p.w,p.h);
                ctx.fillStyle='#8D6E63'; ctx.fillRect(sx,sy,p.w,4);
                ctx.strokeStyle='#6D4C41'; ctx.lineWidth=1;
                for (let bx=sx-(sx%22);bx<sx+p.w;bx+=22) ctx.strokeRect(bx+.5,sy+.5,21,p.h-1);
            }
        }
    }

    function drawPlayer() {

        const sx=player.x-cameraX, sy=player.y;
        if (images.player) {
            ctx.save();
            if (!player.facingRight) { ctx.translate(sx+player.w/2,0); ctx.scale(-1,1); ctx.drawImage(images.player,-player.w/2,sy,player.w,player.h); }
            else ctx.drawImage(images.player,sx,sy,player.w,player.h);
            ctx.restore();
        } else drawPlaceholderPlayer(sx,sy,player.w,player.h,player.facingRight);
    }

    function drawBottles() {
        for (const b of bottles) {
            if (b.collected) continue;
            const sx=b.x-cameraX, sy=b.y+Math.sin(b.animT)*3;
            if (sx+b.w<-20||sx>GAME_WIDTH+20) continue;
            if (images.bottle) ctx.drawImage(images.bottle,sx,sy,b.w,b.h);
            else drawPlaceholderBottle(sx,sy,b.w,b.h);
        }
    }

    function drawEnemies() {
        for (const e of enemies) {
            if (!e.alive) continue;
            const sx=e.x-cameraX, sy=e.y;
            if (sx+e.w<-20||sx>GAME_WIDTH+20) continue;
            if (images.enemy) {
                ctx.save();
                if (e.vx<0) { ctx.translate(sx+e.w/2,0); ctx.scale(-1,1); ctx.drawImage(images.enemy,-e.w/2,sy,e.w,e.h); }
                else ctx.drawImage(images.enemy,sx,sy,e.w,e.h);
                ctx.restore();
            } else drawPlaceholderEnemy(sx,sy,e.w,e.h);
        }
    }

    function drawGoal() {
        const sx=GOAL_X-cameraX;
        if (sx<-30||sx>GAME_WIDTH+30) return;
        // 旗杆
        ctx.fillStyle='#BDBDBD'; ctx.fillRect(sx,200,6,240);
        // 顶球
        ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sx+3,200,10,0,Math.PI*2); ctx.fill();
        // 三角旗
        ctx.fillStyle='#FF5722'; ctx.beginPath(); ctx.moveTo(sx+6,210); ctx.lineTo(sx+45,225); ctx.lineTo(sx+6,240); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.font='bold 10px "Courier New"'; ctx.fillText('GOAL',sx+10,232);
    }

    function render() {
        ctx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
        ctx.setTransform(scaleFactor,0,0,scaleFactor,offsetX,offsetY);
        drawBackground();
        drawPlatforms();
        drawGoal();
        drawBottles();
        drawEnemies();
        drawPlayer();
        drawParticles();
        ctx.setTransform(1,0,0,1,0,0);
    }

    // ==================== 游戏循环 ====================
    function gameLoop() {
        update();
        render();
        animFrameId = requestAnimationFrame(gameLoop);
    }

    // ==================== 控制 ====================
    function startGame() {
        initAudio();
        startBGM();
        resetGameObjects(); // ★ 使用最新 entitySize 创建碰撞箱
        gameState = 'playing';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');
        updateHUD();
        drawHUDIcon();
    }

    function restartGame() { stopBGM(); startGame(); }

    // ==================== 键盘 ====================
    function onKeyDown(e) {
        if (gameState==='menu') { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); startGame(); return; } }
        if (gameState==='gameover'||gameState==='win') { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); restartGame(); return; } }
        if (e.repeat) return;
        switch (e.key) {
            case 'ArrowLeft': case 'a': case 'A': input.left=true; e.preventDefault(); break;
            case 'ArrowRight':case 'd': case 'D': input.right=true;e.preventDefault(); break;
            case 'ArrowUp':   case 'w': case 'W': if(!input.up) input.jumpPressed=true; input.up=true; input.jump=true; e.preventDefault(); break;
            case 'ArrowDown': case 's': case 'S': input.down=true; e.preventDefault(); break;
            case ' ': if(!input.jump) input.jumpPressed=true; input.jump=true; e.preventDefault(); break;
        }
    }
    function onKeyUp(e) {
        switch (e.key) {
            case 'ArrowLeft': case 'a': case 'A': input.left=false; break;
            case 'ArrowRight':case 'd': case 'D': input.right=false;break;
            case 'ArrowUp':   case 'w': case 'W': input.up=false; input.jump=false; break;
            case 'ArrowDown': case 's': case 'S': input.down=false; break;
            case ' ': input.jump=false; break;
        }
    }

    // ==================== D-Pad 触控 ====================
    function setupDPadButton(el, dirKey, isJumpTrigger) {
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (isJumpTrigger && !input.up && !input.jump) input.jumpPressed = true;
            if (isJumpTrigger) { input.up = true; input.jump = true; }
            input[dirKey] = true;
            el.classList.add('pressed');
        });
        const release = (e) => {
            e.preventDefault();
            if (isJumpTrigger) { input.up = false; input.jump = false; }
            input[dirKey] = false;
            el.classList.remove('pressed');
        };
        el.addEventListener('pointerup', release);
        el.addEventListener('pointerleave', release);
        el.addEventListener('pointercancel', release);
    }

    function setupJumpButton(el) {
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (!input.jump) input.jumpPressed = true;
            input.jump = true;
            el.classList.add('pressed');
        });
        const release = (e) => {
            e.preventDefault();
            input.jump = false;
            el.classList.remove('pressed');
        };
        el.addEventListener('pointerup', release);
        el.addEventListener('pointerleave', release);
        el.addEventListener('pointercancel', release);
    }

    // ==================== 触摸阻止 ====================
    function preventTouch(e) { e.preventDefault(); }

    // ==================== 按钮事件 ====================
    btnStart.addEventListener('click', ()=>{ initAudio(); startGame(); });
    btnStart.addEventListener('touchend', (e)=>{ e.preventDefault(); initAudio(); startGame(); });
    btnRetry.addEventListener('click', restartGame);
    btnRetry.addEventListener('touchend', (e)=>{ e.preventDefault(); restartGame(); });
    btnWinRetry.addEventListener('click', restartGame);
    btnWinRetry.addEventListener('touchend', (e)=>{ e.preventDefault(); restartGame(); });

    // ==================== 初始化 ====================
    async function init() {
        resizeCanvas();
        drawHUDIcon();

        // D-Pad 绑定
        setupDPadButton(document.getElementById('dpadUp'),    'up',    true);
        setupDPadButton(document.getElementById('dpadDown'),  'down',  false);
        setupDPadButton(document.getElementById('dpadLeft'),  'left',  false);
        setupDPadButton(document.getElementById('dpadRight'), 'right', false);
        setupJumpButton(btnJump);

        // 键盘
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);

        // 画布触摸阻止
        canvas.addEventListener('touchstart', preventTouch, {passive:false});
        canvas.addEventListener('touchmove',  preventTouch, {passive:false});
        canvas.addEventListener('touchend',   preventTouch, {passive:false});

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', ()=>setTimeout(resizeCanvas,300));

        // 异步加载图片（不阻塞游戏启动）
        loadAllImages();

        resetGameObjects();
        gameState = 'menu';
        gameLoop();
